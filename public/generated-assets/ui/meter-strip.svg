<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="72" viewBox="0 0 720 72" role="img" aria-label="System meter strip">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="panelGrad" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#172721" offset="0"/>
      <stop stop-color="#08130f" offset="1"/>
    </linearGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M 14 0 L 0 0 0 14" fill="none" stroke="#6d8478" stroke-width="0.45" opacity="0.25"/>
    </pattern>
  </defs>
  <rect x="2" y="2" width="716" height="68" rx="12" fill="#101c18" stroke="#6d8478" stroke-width="3"/>
     <path d="M25 36h660" stroke="#6d8478" stroke-width="10" stroke-linecap="round"/>
     <path d="M25 36h415" stroke="#7cf2b0" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
     <text x="28" y="28" fill="#f4fff9" font-family="'Geist Mono', 'SFMono-Regular', 'Menlo', monospace" font-size="14" font-weight="900">SYSTEM METER</text>
</svg>
