<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="840" height="220" viewBox="0 0 840 220" role="img" aria-label="Data Center Game title">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="panelGrad" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#172721" offset="0"/>
      <stop stop-color="#08130f" offset="1"/>
    </linearGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M 14 0 L 0 0 0 14" fill="none" stroke="#6d8478" stroke-width="0.45" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="840" height="220" fill="#08130f"/>
     <rect x="18" y="18" width="804" height="184" rx="18" fill="url(#grid)" stroke="#7cf2b0" stroke-width="3"/>
     <text x="52" y="86" fill="#f4fff9" font-family="'Geist Mono', 'SFMono-Regular', 'Menlo', monospace" font-size="44" font-weight="900" letter-spacing="0">DATA CENTER GAME</text>
     <text x="54" y="128" fill="#7bdff2" font-family="'Geist Mono', 'SFMono-Regular', 'Menlo', monospace" font-size="20" font-weight="800">BUILD COMPUTE, POWER, WATER, AND TRUST</text>
     <path d="M56 160h540" stroke="#f7c873" stroke-width="5"/>
     <rect x="626" y="48" width="124" height="96" rx="12" fill="#14241d" stroke="#7cf2b0" stroke-width="4"/>
     <path d="M646 76h84M646 102h84M646 128h84" stroke="#7cf2b0" stroke-width="6" stroke-linecap="round"/>
</svg>
