<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220" role="img" aria-label="Empty parcel">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="panelGrad" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#172721" offset="0"/>
      <stop stop-color="#08130f" offset="1"/>
    </linearGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M 14 0 L 0 0 0 14" fill="none" stroke="#6d8478" stroke-width="0.45" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="320" height="220" rx="18" fill="#101814"/>
     <rect x="12" y="12" width="296" height="196" rx="14" fill="url(#grid)" stroke="#6d8478" stroke-width="3" stroke-dasharray="10 10"/>
     <path d="M120 110h80M160 70v80" stroke="#6d8478" stroke-width="6" stroke-linecap="round"/>
     <text x="160" y="196" text-anchor="middle" fill="#9fb6aa" font-family="'Geist Mono', 'SFMono-Regular', 'Menlo', monospace" font-size="18" font-weight="800">EMPTY PARCEL</text>
</svg>
