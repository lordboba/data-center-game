     </g>
     <text x="160" y="197" text-anchor="middle" fill="#f4fff9" font-family="'Geist Mono', 'SFMono-Regular', 'Menlo', monospace" font-size="19" font-weight="900" letter-spacing="0">Efficiency Lab</text>
